<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>pi: session web ui</title>
<!-- Syntax highlighting disabled in favor of theme-native code blocks -->
<style>
/* ══════════════════════════════════════════════════════════════
   Z-Index Scale
   ══════════════════════════════════════════════════════════════
   Layer    0 — Content (default stacking context)
   Layer   10 — Fixed elements (header, scroll-to-bottom btn)
   Layer   50 — Overlays (sidebar, sidebar-backdrop)
   Layer  100 — Modals (popups, dialogs)
   Layer 9999 — Global effects (noise grain texture)
   ══════════════════════════════════════════════════════════════ */

/* ══════════════════════════════════════════════════════════════
   CSS Custom Properties — Theming
   ══════════════════════════════════════════════════════════════ */
:root {
  /* Typography — system-native fonts for zero-dependency, instant rendering.
     macOS: SF Pro / PingFang SC  |  Windows: Segoe UI / Microsoft YaHei  |  Linux: system-ui / Noto Sans CJK */
  --font-display: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif;
  --font-body: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif;
  --font-mono: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'SF Mono', 'IBM Plex Mono', 'Menlo', Monaco, Consolas, 'Noto Sans Mono', monospace;

  /* Modular type scale */
  --text-2xs: 0.6875rem;  /* 11px */
  --text-xs:  0.75rem;    /* 12px */
  --text-sm:  0.8125rem;  /* 13px */
  --text-base: 0.875rem;  /* 14px */
  --text-md:  0.9375rem;  /* 15px */
  --text-lg:  1rem;       /* 16px */
  --text-xl:  1.25rem;    /* 20px */
  --text-2xl: 1.5rem;     /* 24px */

  /* Spacing */
  --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
  --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px; --sp-12: 48px; --sp-16: 64px;

  /* Radii */
  --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px;
  --radius-full: 9999px;

  /* Easing */
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);

  /* Duration */
  --duration-fast: 150ms;
  --duration-normal: 250ms;
  --duration-slow: 400ms;
  --duration-reveal: 600ms;

  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.03);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.03);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.03);

  /* Tool icon colors */
  --tool-bash:     #d9935a;
  --tool-read:     #6b8ebf;
  --tool-edit:     #4aba8c;
  --tool-write:    #b87a4a;
  --tool-grep:     #e6aa46;
  --tool-list:     #a09080;
  --tool-web:      #6b8ebf;
  --tool-task:     #be8cc8;
  --tool-question: #b4a0d2;
  --tool-mcp:      #96a5c3;
}

/* ── Dark theme (warm charcoal & copper) ── */
[data-theme="dark"] {
  --bg-base: #1a1410;
  --bg-surface: #221a15;
  --bg-surface-hover: #2a2019;
  --bg-elevated: #2c221a;
  --bg-input: rgba(34, 26, 21, 0.92);
  --bg-code: #1f1813;
  --bg-tool: #221a15;
  --bg-accent: #e09060;
  --bg-accent-soft: rgba(224, 144, 96, 0.15);
  --bg-accent-glow: rgba(224, 144, 96, 0.08);
  --bg-danger: rgba(248, 113, 113, 0.12);
  --bg-success: rgba(74, 222, 128, 0.10);

  --text-base: #ece2d3;
  --text-muted: #a89c8c;
  --text-faint: #7a6e5e;
  --text-inverse: #1a1410;
  --text-accent: #e09060;
  --text-accent-dim: #c07848;
  --text-danger: #f87171;
  --text-success: #4ade80;
  --text-link: #6ea8fe;

  --border-base: rgba(255, 255, 255, 0.08);
  --border-strong: rgba(255, 255, 255, 0.14);
  --border-accent: rgba(224, 144, 96, 0.30);

  --scrollbar-thumb: rgba(255, 255, 255, 0.10);
  --scrollbar-thumb-hover: rgba(255, 255, 255, 0.18);

  --glow-primary: radial-gradient(ellipse 65% 35% at 50% 15%, rgba(224, 144, 96, 0.08) 0%, transparent 100%);
  --noise-opacity: 0.025;
}

/* ── Light theme (neutral stone + copper accent) ──
   Deliberately avoids the "premium-consumer" warm-cream palette
   (beige+brass+espresso). Uses cool-neutral greys with the same
   copper accent for brand continuity. ── */
[data-theme="light"] {
  --bg-base: #f5f4f1;
  --bg-surface: #fafaf7;
  --bg-surface-hover: #f0eeea;
  --bg-elevated: #fcfcfa;
  --bg-input: rgba(255, 255, 255, 0.85);
  --bg-code: #eeebe6;
  --bg-tool: #f0eeea;
  --bg-accent: #c08050;
  --bg-accent-soft: rgba(192, 128, 80, 0.12);
  --bg-accent-glow: rgba(192, 128, 80, 0.06);
  --bg-danger: rgba(239, 68, 68, 0.08);
  --bg-success: rgba(74, 222, 128, 0.08);

  --text-base: #1c1917;
  --text-muted: #6b6058;
  --text-faint: #968b82;
  --text-inverse: #faf8f5;
  --text-accent: #b07040;
  --text-accent-dim: #805830;
  --text-danger: #dc2626;
  --text-success: #16a34a;
  --text-link: #4b6fd4;

  --border-base: rgba(0, 0, 0, 0.06);
  --border-strong: rgba(0, 0, 0, 0.10);
  --border-accent: rgba(192, 128, 80, 0.25);

  --scrollbar-thumb: rgba(0, 0, 0, 0.08);
  --scrollbar-thumb-hover: rgba(0, 0, 0, 0.14);

  --glow-primary: radial-gradient(ellipse 65% 35% at 50% 15%, rgba(192, 128, 80, 0.06) 0%, transparent 100%);
  --noise-opacity: 0.015;

  /* Tool icon overrides — darker for legibility on light background */
  --tool-bash:     #a85f2a;
  --tool-read:     #4a6b9c;
  --tool-edit:     #2d8a64;
  --tool-write:    #8a5a30;
  --tool-grep:     #b08320;
  --tool-list:     #6e5e50;
  --tool-web:      #4a6b9c;
  --tool-task:     #8a5da0;
  --tool-question: #7a5fa0;
  --tool-mcp:      #6078a0;
}

/* ── System preference ── */
@media (prefers-color-scheme: dark) {
  [data-theme="system"] {
    --bg-base: #1a1410;
    --bg-surface: #221a15;
    --bg-surface-hover: #2a2019;
    --bg-elevated: #2c221a;
    --bg-input: rgba(34, 26, 21, 0.92);
    --bg-code: #1f1813;
    --bg-tool: #221a15;
    --bg-accent: #e09060;
    --bg-accent-soft: rgba(224, 144, 96, 0.15);
    --bg-accent-glow: rgba(224, 144, 96, 0.08);
    --bg-danger: rgba(248, 113, 113, 0.12);
    --bg-success: rgba(74, 222, 128, 0.10);
    --text-base: #ece2d3;
    --text-muted: #a89c8c;
    --text-faint: #7a6e5e;
    --text-inverse: #1a1410;
    --text-accent: #e09060;
    --text-accent-dim: #c07848;
    --text-danger: #f87171;
    --text-success: #4ade80;
    --text-link: #6ea8fe;
    --border-base: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.14);
    --border-accent: rgba(224, 144, 96, 0.30);
    --scrollbar-thumb: rgba(255, 255, 255, 0.10);
    --scrollbar-thumb-hover: rgba(255, 255, 255, 0.18);
    --glow-primary: radial-gradient(ellipse 65% 35% at 50% 15%, rgba(224, 144, 96, 0.08) 0%, transparent 100%);
    --noise-opacity: 0.025;
  }
}

@media (prefers-color-scheme: light) {
  [data-theme="system"] {
    --bg-base: #f5f4f1;
    --bg-surface: #fafaf7;
    --bg-surface-hover: #f0eeea;
    --bg-elevated: #fcfcfa;
    --bg-input: rgba(255, 255, 255, 0.85);
    --bg-code: #eeebe6;
    --bg-tool: #f0eeea;
    --bg-accent: #c08050;
    --bg-accent-soft: rgba(192, 128, 80, 0.12);
    --bg-accent-glow: rgba(192, 128, 80, 0.06);
    --bg-danger: rgba(239, 68, 68, 0.08);
    --bg-success: rgba(74, 222, 128, 0.08);
    --text-base: #1c1917;
    --text-muted: #6b6058;
    --text-faint: #968b82;
    --text-inverse: #faf8f5;
    --text-accent: #b07040;
    --text-accent-dim: #805830;
    --text-danger: #dc2626;
    --text-success: #16a34a;
    --text-link: #4b6fd4;
    --border-base: rgba(0, 0, 0, 0.06);
    --border-strong: rgba(0, 0, 0, 0.10);
    --border-accent: rgba(192, 128, 80, 0.25);
    --scrollbar-thumb: rgba(0, 0, 0, 0.08);
    --scrollbar-thumb-hover: rgba(0, 0, 0, 0.14);
    --glow-primary: radial-gradient(ellipse 65% 35% at 50% 15%, rgba(192, 128, 80, 0.06) 0%, transparent 100%);
    --noise-opacity: 0.015;
    --tool-bash: #a85f2a;
    --tool-read: #4a6b9c;
    --tool-edit: #2d8a64;
    --tool-write: #8a5a30;
    --tool-grep: #b08320;
    --tool-list: #6e5e50;
    --tool-web: #4a6b9c;
    --tool-task: #8a5da0;
    --tool-question: #7a5fa0;
    --tool-mcp: #6078a0;
  }
}

/* ══════════════════════════════════════════════════════════════
   Noise Texture (CSS-only grain)
   ══════════════════════════════════════════════════════════════ */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  opacity: var(--noise-opacity, 0.03);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px 256px;
  pointer-events: none;
  z-index: 9999;
  mix-blend-mode: overlay;
}

/* ══════════════════════════════════════════════════════════════
   Reset & Base
   ══════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  height: 100%;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  height: 100%;
  font-family: var(--font-body);
  background: var(--bg-base);
  color: var(--text-base);
  line-height: 1.55;
  overflow: hidden;
  transition: background var(--duration-normal) var(--ease-out), color var(--duration-normal) var(--ease-out);
}

/* ══════════════════════════════════════════════════════════════
   Focus indicators — mandatory for keyboard accessibility
   ══════════════════════════════════════════════════════════════ */
button:focus-visible,
input:focus-visible,
textarea:focus-visible,
[tabindex]:focus-visible,
.model-popup-item:focus-visible,
.sidebar-item:focus-visible,
.sidebar-group-header:focus-visible,
.tool-card-header:focus-visible,
.model-badge:focus-visible,
.scroll-bottom-btn:focus-visible,
.theme-toggle:focus-visible,
.code-copy-btn:focus-visible,
.tool-copy-btn:focus-visible,
.btn-new-session:focus-visible,
.dialog-btn:focus-visible {
  outline: 2px solid var(--border-accent);
  outline-offset: 2px;
}

/* ══════════════════════════════════════════════════════════════
   Reduced motion — mandatory for MOTION_INTENSITY > 3
   ══════════════════════════════════════════════════════════════ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }

::selection {
  background: var(--bg-accent);
  color: var(--text-inverse);
}

/* ══════════════════════════════════════════════════════════════
   App Layout
   ══════════════════════════════════════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 980px;
  margin: 0 auto;
  padding: 0 var(--sp-6);
  position: relative;
  background: var(--glow-primary);
}

/* ══════════════════════════════════════════════════════════════
   Connection Status — chip with dot in header-right
   ══════════════════════════════════════════════════════════════ */
.connection-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  height: 32px;
  padding: 0 var(--sp-3);
  border-radius: var(--radius-sm);
  background: var(--bg-surface);
  border: 1px solid var(--border-base);
  font-size: var(--text-xs);
  font-weight: 500;
  color: var(--text-muted);
  flex-shrink: 0;
  cursor: default;
  user-select: none;
  box-sizing: border-box;
  transition: border-color var(--duration-normal) var(--ease-out);
  font-variant-numeric: tabular-nums;
}

.connection-chip-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: background var(--duration-normal) var(--ease-out);
}

.connection-chip-label { text-transform: capitalize; line-height: 1; }

.connection-chip.connected { border-color: rgba(74, 222, 128, 0.25); }
.connection-chip.connected .connection-chip-dot { background: #4ade80; box-shadow: 0 0 5px rgba(74, 222, 128, 0.4); }

.connection-chip.disconnected { border-color: rgba(239, 68, 68, 0.2); }
.connection-chip.disconnected .connection-chip-dot { background: #ef4444; box-shadow: 0 0 4px rgba(239, 68, 68, 0.35); }

.connection-chip.reconnecting { border-color: rgba(251, 191, 36, 0.25); }
.connection-chip.reconnecting .connection-chip-dot { background: #fbbf24; box-shadow: 0 0 5px rgba(251, 191, 36, 0.4); animation: pulse-dot 1.5s ease-in-out infinite; }

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

/* ══════════════════════════════════════════════════════════════
   Header
   ══════════════════════════════════════════════════════════════ */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--sp-4) 0;
  gap: var(--sp-3);
  flex-shrink: 0;
  border-bottom: 1px solid var(--border-base);
  position: relative;
  z-index: 10;
  width: 100vw;
  margin-left: calc(-50vw + 50%);
  padding-left: calc(50vw - 50% + var(--sp-6));
  padding-right: calc(50vw - 50% + var(--sp-6));
}

.header-left { display: flex; align-items: center; gap: var(--sp-4); min-width: 0; flex: 1; }
.header-right { display: flex; align-items: center; gap: var(--sp-3); flex-shrink: 0; }

/* Logo mark */
.header-logo {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: var(--radius-sm);
  background: var(--bg-surface); border: 1px solid var(--border-strong);
  color: var(--text-accent); font-family: var(--font-mono);
  font-size: var(--text-lg); font-weight: 600; line-height: 1;
  flex-shrink: 0; cursor: default; user-select: none;
  transition: all var(--duration-fast) var(--ease-out);
}

/* Model badge */
.model-badge {
  display: flex; align-items: center; gap: 5px; height: 32px;
  font-size: var(--text-xs); white-space: nowrap; min-width: 0;
  padding: 0 var(--sp-3); background: var(--bg-surface);
  border: 1px solid var(--border-base); border-radius: var(--radius-sm);
  box-sizing: border-box; transition: all var(--duration-fast) var(--ease-out);
  letter-spacing: -0.01em; cursor: pointer; position: relative;
}
.model-badge:hover { border-color: var(--border-accent); background: var(--bg-surface-hover); }

.model-chevron {
  width: 10px; height: 10px; flex-shrink: 0; opacity: 0.4;
  transition: transform var(--duration-fast) var(--ease-out);
}
.model-badge:hover .model-chevron { opacity: 0.7; }

.model-provider {
  font-weight: 600; color: var(--text-accent); text-transform: uppercase;
  font-size: var(--text-xs); letter-spacing: 0.06em; line-height: 1;
}
.model-sep { color: var(--text-faint); font-size: var(--text-xs); font-weight: 300; line-height: 1; }
.model-name {
  font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-muted);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1;
  font-variant-numeric: tabular-nums;
}

/* CWD indicator */
.header-cwd {
  display: flex; align-items: center; gap: var(--sp-1); height: 32px;
  font-size: var(--text-xs); color: var(--text-faint); font-family: var(--font-mono);
  min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  padding: 0 var(--sp-2); border-radius: var(--radius-sm);
  background: var(--bg-surface); border: 1px solid var(--border-base);
  box-sizing: border-box; transition: all var(--duration-fast) var(--ease-out);
  font-variant-numeric: tabular-nums;
}
.header-cwd:hover { border-color: var(--border-strong); }
.header-cwd svg { flex-shrink: 0; width: 12px; height: 12px; opacity: 0.6; }

/* Thinking indicator */
.thinking-indicator {
  display: flex; align-items: center; gap: 6px; height: 32px;
  font-size: var(--text-xs); color: var(--text-accent); font-weight: 500;
  padding: 0 var(--sp-3); border-radius: var(--radius-sm);
  background: var(--bg-accent-soft); border: 1px solid var(--border-accent);
  box-sizing: border-box; animation: think-glow 2s ease-in-out infinite;
}
@keyframes think-glow {
  0%, 100% { box-shadow: 0 0 0 0 var(--bg-accent-glow); }
  50% { box-shadow: 0 0 16px 2px var(--bg-accent-glow); }
}

.thinking-dots { display: flex; gap: 3px; }
.thinking-dots span {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--text-accent); animation: thinkBounce 1.4s infinite ease-in-out both;
}
.thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
.thinking-dots span:nth-child(2) { animation-delay: -0.16s; }
.thinking-dots span:nth-child(3) { animation-delay: 0s; }

@keyframes thinkBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* Theme toggle — SVG icons */
.theme-toggle {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: var(--radius-sm);
  border: 1px solid var(--border-base); background: var(--bg-surface);
  color: var(--text-muted); cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out); position: relative;
}
.theme-toggle:hover { background: var(--bg-surface-hover); border-color: var(--border-strong); color: var(--text-base); transform: translateY(-1px); }
.theme-toggle:active { transform: scale(0.92); }
.theme-toggle svg { width: 16px; height: 16px; }

.hidden { display: none !important; }

/* ── Model Select Popup ── */
.model-popup {
  position: absolute; top: calc(100% + 6px); left: 0;
  min-width: 240px; max-width: 360px; max-height: 360px;
  overflow-y: auto; background: var(--bg-elevated);
  border: 1px solid var(--border-strong); border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg); z-index: 100; padding: var(--sp-1) 0;
  animation: popup-enter var(--duration-fast) var(--ease-out);
}
@keyframes popup-enter {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

.model-popup-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--sp-2) var(--sp-3); font-size: var(--text-xs);
  font-weight: 600; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.06em; border-bottom: 1px solid var(--border-base);
}

/* Model search filter */
.model-popup-search {
  display: flex; align-items: center; gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-3);
  border-bottom: 1px solid var(--border-base); color: var(--text-faint);
}
.model-popup-search-input {
  flex: 1; border: none; outline: none; background: transparent;
  font-size: var(--text-sm); color: var(--text-base); font-family: var(--font-body);
}
.model-popup-search-input::placeholder { color: var(--text-faint); }

.model-popup-item {
  display: flex; align-items: center; gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-3); cursor: pointer;
  transition: background var(--duration-fast) var(--ease-out);
  font-size: var(--text-sm); line-height: 1.4;
}
.model-popup-item:hover { background: var(--bg-surface-hover); }
.model-popup-item.active { background: var(--bg-accent-soft); color: var(--text-accent); }
.model-popup-item .popup-provider {
  font-size: var(--text-xs); font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--text-accent); flex-shrink: 0; min-width: 52px;
}
.model-popup-item .popup-name {
  font-family: var(--font-mono); font-size: var(--text-sm); color: var(--text-base);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.model-popup-item .popup-check {
  margin-left: auto; flex-shrink: 0; color: var(--text-accent);
}
.model-popup-item .popup-check svg { width: 13px; height: 13px; display: block; }
.model-popup-loading { padding: var(--sp-4); text-align: center; font-size: var(--text-sm); color: var(--text-muted); }
.model-popup-error { padding: var(--sp-3); text-align: center; font-size: var(--text-xs); color: var(--text-danger); }

/* ══════════════════════════════════════════════════════════════
   Messages Container
   ══════════════════════════════════════════════════════════════ */
.messages-viewport { flex: 1; position: relative; min-height: 0; }

.messages-container {
  height: 100%; overflow-y: auto; overflow-x: hidden;
  padding: var(--sp-6) 0; scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  width: 100vw; margin-left: calc(-50vw + 50%);
  padding-left: calc(50vw - 50% + var(--sp-6));
  padding-right: calc(50vw - 50% + var(--sp-6));
}

.messages-list {
  display: flex; flex-direction: column; gap: var(--sp-5); position: relative;
}

/* Scroll-to-bottom floating button */
.scroll-bottom-btn {
  position: absolute; bottom: var(--sp-5); right: var(--sp-5);
  z-index: 10; width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border-base); background: var(--bg-surface);
  color: var(--text-muted); cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  box-shadow: var(--shadow-md); opacity: 0; transform: translateY(8px);
  pointer-events: none;
  transition: opacity var(--duration-normal) var(--ease-out),
              transform var(--duration-normal) var(--ease-out),
              background var(--duration-fast) var(--ease-out),
              color var(--duration-fast) var(--ease-out);
}
.scroll-bottom-btn svg { width: 16px; height: 16px; }
.scroll-bottom-btn.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
.scroll-bottom-btn:hover { background: var(--bg-surface-hover); color: var(--text-base); border-color: var(--border-strong); transform: translateY(-1px); }
.scroll-bottom-btn:active { transform: scale(0.92); }
.scroll-bottom-btn .badge {
  position: absolute; top: -4px; right: -4px; width: 8px; height: 8px;
  border-radius: 50%; background: var(--bg-accent); border: 2px solid var(--bg-base);
  opacity: 0; transition: opacity var(--duration-fast);
}
.scroll-bottom-btn.visible .badge.streaming { opacity: 1; animation: pulse-dot 1.5s ease-in-out infinite; }

/* Staggered entry animation for messages */
@keyframes message-enter {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.message { animation: message-enter var(--duration-slow) var(--ease-out) both; }

/* Date separator — appears when crossing day boundaries */
.date-separator {
  display: flex; align-items: center; gap: var(--sp-3);
  padding: var(--sp-2) 0; margin: var(--sp-1) 0;
  animation: message-enter var(--duration-slow) var(--ease-out) both;
}
.date-separator span {
  font-size: var(--text-xs); color: var(--text-faint); font-weight: 500;
  white-space: nowrap; font-variant-numeric: tabular-nums;
}
.date-separator::before,
.date-separator::after {
  content: ''; flex: 1; height: 1px; background: var(--border-base);
}

/* ══════════════════════════════════════════════════════════════
   Empty State
   ══════════════════════════════════════════════════════════════ */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center;
  padding: var(--sp-16) var(--sp-6); flex: 1; gap: var(--sp-4);
  animation: message-enter var(--duration-reveal) var(--ease-out);
}
.empty-state.hidden { display: none; }

.empty-state-icon {
  font-family: var(--font-mono); font-size: 3rem; font-weight: 500;
  color: var(--text-accent); opacity: 0.35; line-height: 1;
  letter-spacing: -0.02em;
  transition: opacity var(--duration-normal) var(--ease-out);
}
.empty-state:hover .empty-state-icon { opacity: 0.5; }

.empty-state-title {
  font-family: var(--font-display); font-size: var(--text-xl);
  font-weight: 500; color: var(--text-muted); line-height: 1.3; letter-spacing: -0.01em;
}
.empty-state-desc {
  font-size: var(--text-base); color: var(--text-faint);
  max-width: 360px; line-height: 1.5;
}
.empty-state-hint {
  font-size: var(--text-xs); color: var(--text-faint);
  padding: var(--sp-2) var(--sp-4); border-radius: var(--radius-full);
  background: var(--bg-surface); border: 1px solid var(--border-base);
  font-family: var(--font-mono); letter-spacing: -0.01em;
}

/* ══════════════════════════════════════════════════════════════
   Message — Editorial Style
   ══════════════════════════════════════════════════════════════ */
.message-header {
  display: flex; align-items: center; justify-content: space-between;
  gap: var(--sp-2); padding: var(--sp-1) 0;
  border-radius: var(--radius-sm); margin-bottom: var(--sp-1);
}
.message-role {
  font-size: var(--text-2xs); font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text-faint);
}
.message-meta {
  font-size: var(--text-2xs); color: var(--text-faint);
  font-family: var(--font-mono); font-variant-numeric: tabular-nums; opacity: 0.6;
}

/* ══════════════════════════════════════════════════════════════
   Assistant Message (editorial — no bubble)
   ══════════════════════════════════════════════════════════════ */
.message.assistant { display: flex; flex-direction: column; gap: var(--sp-3); }
.message.assistant .message-header { margin-bottom: 0; }

.message.assistant .message-content {
  font-size: var(--text-md); line-height: 1.6; color: var(--text-base);
  overflow-wrap: break-word; word-break: break-word; padding: 0;
}

/* Markdown content — clean technical typography */
.message-content h1, .message-content h2, .message-content h3, .message-content h4 {
  font-family: var(--font-display); font-weight: 600; color: var(--text-base);
  margin-top: 1.2em; margin-bottom: 0.4em; line-height: 1.3; letter-spacing: -0.01em;
}
.message-content h1 { font-size: var(--text-2xl); }
.message-content h2 { font-size: var(--text-xl); }
.message-content h3 { font-size: var(--text-lg); }
.message-content h4 {
  font-size: var(--text-md); font-weight: 700; color: var(--text-accent);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.message-content h1:first-child, .message-content h2:first-child, .message-content h3:first-child { margin-top: 0; }
.message-content p { margin: 0.7em 0; }
.message-content p:first-child { margin-top: 0; }
.message-content p:last-child { margin-bottom: 0; }
.message-content ul, .message-content ol { padding-left: 1.5em; margin: 0.6em 0; }
.message-content li { margin: 0.3em 0; }
.message-content strong { font-weight: 600; color: var(--text-base); }
.message-content blockquote {
  border-left: 3px solid var(--border-accent); padding-left: var(--sp-4);
  margin: 0.8em 0; color: var(--text-muted); font-style: italic;
}
.message-content a {
  color: var(--text-link); text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color var(--duration-fast) var(--ease-out);
}
.message-content a:hover { border-bottom-color: var(--text-link); }
.message-content hr { border: none; border-top: 1px solid var(--border-base); margin: 1.2em 0; }
.message-content img { max-width: 100%; border-radius: var(--radius-md); margin: 0.8em 0; height: auto; box-shadow: var(--shadow-md); }
.message-content table {
  border-collapse: collapse; width: 100%; margin: 0.8em 0;
  font-size: var(--text-sm); border-radius: var(--radius-sm); overflow: hidden;
}
.message-content th, .message-content td { border: 1px solid var(--border-base); padding: var(--sp-2) var(--sp-3); text-align: left; }
.message-content th {
  background: var(--bg-surface-hover); font-weight: 600; color: var(--text-base);
  font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.05em;
}
.message-content td { background: transparent; }
.message-content tbody tr:nth-child(even) td { background: var(--bg-surface-hover); }

/* Code blocks */
.message-content pre {
  background: var(--bg-code);
  border: 1px solid var(--border-base);
  border-radius: var(--radius-md); padding: var(--sp-4); margin: 0.8em 0;
  overflow-x: auto; font-family: var(--font-mono); font-size: var(--text-sm);
  line-height: 1.6; font-variant-numeric: tabular-nums; position: relative;
}
.message-content code {
  font-family: var(--font-mono); font-size: var(--text-sm);
  font-variant-numeric: tabular-nums; background: var(--bg-code);
  padding: 2px 7px; border-radius: 4px; color: var(--text-accent);
}
.message-content pre code { background: none; padding: 0; border-radius: 0; color: var(--text-base); }

.code-lang {
  position: absolute; top: var(--sp-2); right: var(--sp-3);
  font-size: var(--text-xs); font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-faint); opacity: 0.5;
}

.code-copy-btn {
  position: absolute; top: var(--sp-2); right: var(--sp-3);
  display: flex; align-items: center; gap: 4px; padding: 3px 10px;
  border-radius: var(--radius-sm); border: 1px solid var(--border-base);
  background: var(--bg-surface); color: var(--text-faint);
  font-size: var(--text-2xs); font-family: var(--font-body);
  cursor: pointer; transition: all var(--duration-fast) var(--ease-out); z-index: 2;
}
.code-copy-btn svg { width: 12px; height: 12px; }
.code-copy-btn:hover { background: var(--bg-surface-hover); color: var(--text-base); border-color: var(--border-strong); }
.code-copy-btn.copied { border-color: var(--text-success); color: var(--text-success); }
.code-copy-btn.copied svg { color: var(--text-success); }

/* ══════════════════════════════════════════════════════════════
   User Message (pill-style, right-aligned)
   ══════════════════════════════════════════════════════════════ */
.message.user .message-header { justify-content: flex-end; }
.message.user .message-role { display: none; }

.message.user .message-content {
  background: var(--bg-accent-soft); border: 1px solid var(--border-accent);
  border-radius: var(--radius-lg) var(--radius-lg) var(--radius-sm) var(--radius-lg);
  padding: var(--sp-3) var(--sp-5); font-size: var(--text-md); line-height: 1.5;
  color: var(--text-base); overflow-wrap: break-word; word-break: break-word;
  white-space: pre-wrap; width: fit-content; max-width: 85%; margin-left: auto;
  box-shadow: var(--shadow-sm);
  transition: box-shadow var(--duration-fast) var(--ease-out);
}
.message.user .message-content:hover { box-shadow: var(--shadow-md); }

/* ══════════════════════════════════════════════════════════════
   Thinking / Reasoning Block
   ══════════════════════════════════════════════════════════════ */
.thinking-block {
  border-left: 2px solid var(--border-accent); padding: var(--sp-3) var(--sp-4);
  margin: 0; background: var(--bg-accent-soft);
  border-radius: 0 var(--radius-md) var(--radius-md) 0; position: relative;
}
.thinking-block::before {
  content: ''; position: absolute; top: 0; left: -2px; bottom: 0; width: 2px;
  background: linear-gradient(to bottom, var(--text-accent), var(--bg-accent));
  border-radius: 1px;
}
.thinking-block .thinking-label {
  font-size: var(--text-2xs); font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-accent);
  display: flex; align-items: center; gap: var(--sp-2);
  cursor: pointer; user-select: none;
  transition: opacity var(--duration-fast) var(--ease-out);
}
.thinking-block .thinking-label:hover { opacity: 0.8; }
.thinking-block .thinking-label::after {
  content: ''; flex: 1; height: 1px; background: var(--border-accent);
}
.thinking-label svg { width: 14px; height: 14px; flex-shrink: 0; color: var(--text-accent); }
.think-elapsed { font-size: var(--text-2xs); color: var(--text-faint); font-variant-numeric: tabular-nums; }

.thinking-toggle {
  width: 14px; height: 14px; flex-shrink: 0; color: var(--text-accent);
  transition: transform var(--duration-fast) var(--ease-out);
}
.thinking-block.open .thinking-toggle { transform: rotate(90deg); }

.thinking-block .thinking-text { display: none; }
.thinking-block.open .thinking-text { display: block; }
.thinking-block .thinking-text {
  font-size: var(--text-sm); color: var(--text-muted); line-height: 1.6;
  white-space: pre-wrap; font-variant-numeric: tabular-nums;
}

/* ══════════════════════════════════════════════════════════════
   Tool Card
   ══════════════════════════════════════════════════════════════ */
.tool-card {
  border: 1px solid var(--border-base); border-radius: var(--radius-md);
  background: var(--bg-tool); overflow: hidden;
  transition: border-color var(--duration-normal) var(--ease-out),
              box-shadow var(--duration-normal) var(--ease-out);
  animation: message-enter var(--duration-slow) var(--ease-out) both;
}
.tool-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-sm); }

.tool-card-header {
  display: flex; align-items: center; justify-content: space-between;
  gap: var(--sp-2); padding: var(--sp-3) var(--sp-4);
  cursor: pointer; user-select: none;
  transition: background var(--duration-fast) var(--ease-out);
}
.tool-card-header:hover { background: var(--bg-surface-hover); }

.tool-card-info { display: flex; align-items: center; gap: var(--sp-3); min-width: 0; flex: 1; }

.tool-icon {
  width: 26px; height: 26px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: transform var(--duration-fast) var(--ease-spring);
}
.tool-icon svg { width: 16px; height: 16px; display: block; }
.tool-card:hover .tool-icon { transform: scale(1.05); }

.tool-icon.bash     { background: color-mix(in oklab, var(--tool-bash)     15%, transparent); color: var(--tool-bash); }
.tool-icon.read     { background: color-mix(in oklab, var(--tool-read)     12%, transparent); color: var(--tool-read); }
.tool-icon.edit     { background: color-mix(in oklab, var(--tool-edit)     12%, transparent); color: var(--tool-edit); }
.tool-icon.write    { background: color-mix(in oklab, var(--tool-write)    12%, transparent); color: var(--tool-write); }
.tool-icon.grep,
.tool-icon.glob     { background: color-mix(in oklab, var(--tool-grep)     12%, transparent); color: var(--tool-grep); }
.tool-icon.list     { background: color-mix(in oklab, var(--tool-list)     12%, transparent); color: var(--tool-list); }
.tool-icon.web      { background: color-mix(in oklab, var(--tool-web)      12%, transparent); color: var(--tool-web); }
.tool-icon.task     { background: color-mix(in oklab, var(--tool-task)     12%, transparent); color: var(--tool-task); }
.tool-icon.question { background: color-mix(in oklab, var(--tool-question) 12%, transparent); color: var(--tool-question); }
.tool-icon.mcp      { background: color-mix(in oklab, var(--tool-mcp)      12%, transparent); color: var(--tool-mcp); }
.tool-icon.default  { background: var(--bg-surface); color: var(--text-muted); }

.tool-label { font-size: var(--text-base); font-weight: 600; color: var(--text-base); min-width: 0; line-height: 1.3; }
.tool-subtitle {
  font-size: var(--text-xs); color: var(--text-muted); font-family: var(--font-mono);
  line-height: 1.4; word-break: break-word; overflow-wrap: break-word;
  font-variant-numeric: tabular-nums;
}

.tool-status {
  display: flex; align-items: center; gap: 5px;
  font-size: var(--text-2xs); font-weight: 500; color: var(--text-muted);
  flex-shrink: 0; padding: 2px 8px; border-radius: var(--radius-full);
  background: var(--bg-surface); border: 1px solid var(--border-base);
  font-variant-numeric: tabular-nums;
}

/* Elapsed time display on running tools */
.tool-elapsed {
  opacity: 0.6; font-variant-numeric: tabular-nums;
}

.spinner {
  width: 10px; height: 10px; border: 2px solid var(--border-base);
  border-top-color: var(--text-accent); border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.dot-success { width: 5px; height: 5px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px rgba(74, 222, 128, 0.4); }
.dot-error   { width: 5px; height: 5px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 6px rgba(239, 68, 68, 0.4); }

.chevron {
  width: 14px; height: 14px; color: var(--text-faint); flex-shrink: 0;
  transition: transform var(--duration-fast) var(--ease-out);
}
.chevron svg { width: 14px; height: 14px; display: block; }
.chevron.open { transform: rotate(90deg); }

.tool-card-body {
  position: relative; border-top: 1px solid var(--border-base);
  padding: var(--sp-4); font-size: var(--text-sm); line-height: 1.6;
  overflow-x: auto; display: none;
}
.tool-card-body.open { display: block; animation: tool-expand var(--duration-normal) var(--ease-out); }
@keyframes tool-expand {
  from { opacity: 0; max-height: 0; padding-top: 0; padding-bottom: 0; }
  to { opacity: 1; max-height: 2000px; }
}

.tool-card-body pre {
  background: var(--bg-code); border-radius: var(--radius-sm); padding: var(--sp-3);
  font-family: var(--font-mono); font-size: var(--text-sm); line-height: 1.55;
  overflow-x: auto; white-space: pre-wrap; word-break: break-word;
  margin: 0; border: 1px solid var(--border-base); max-height: 300px; overflow-y: auto;
}

/* Tool output copy button */
.tool-copy-btn {
  position: absolute; top: var(--sp-2); right: var(--sp-3);
  display: flex; align-items: center; gap: 4px; padding: 3px 10px;
  border-radius: var(--radius-sm); border: 1px solid var(--border-base);
  background: var(--bg-surface); color: var(--text-faint);
  font-size: var(--text-2xs); font-family: var(--font-body);
  cursor: pointer; transition: all var(--duration-fast) var(--ease-out); z-index: 2;
}
.tool-copy-btn svg { width: 12px; height: 12px; }
.tool-copy-btn:hover { background: var(--bg-surface-hover); color: var(--text-base); border-color: var(--border-strong); }
.tool-copy-btn.copied { border-color: var(--text-success); color: var(--text-success); }
.tool-copy-btn.copied svg { color: var(--text-success); }

/* Args pills (seldom used but kept for completeness) */
.tool-args { display: flex; flex-wrap: wrap; gap: var(--sp-1); margin-top: var(--sp-2); }
.tool-arg {
  display: inline-flex; padding: 2px 8px; border-radius: 4px;
  background: var(--bg-code); font-family: var(--font-mono);
  font-size: var(--text-2xs); color: var(--text-muted); border: 1px solid var(--border-base);
}

/* ══════════════════════════════════════════════════════════════
   Streaming cursor
   ══════════════════════════════════════════════════════════════ */
.streaming-cursor::after {
  content: '\258d'; animation: blink 1s step-end infinite;
  color: var(--text-accent); margin-left: 2px; font-weight: 400;
}
@keyframes blink { 50% { opacity: 0; } }

/* ══════════════════════════════════════════════════════════════
   Input Area — Floating Glass
   ══════════════════════════════════════════════════════════════ */
.input-container {
  flex-shrink: 0; padding: var(--sp-4) 0 var(--sp-5);
  position: relative; z-index: 10;
}
.input-container::before {
  content: ''; position: absolute; top: -12px;
  left: calc(-1 * var(--sp-6)); right: calc(-1 * var(--sp-6));
  height: 24px; background: linear-gradient(to top, var(--bg-base) 40%, transparent);
  pointer-events: none;
}

.input-wrapper {
  display: flex; align-items: flex-end; gap: var(--sp-2);
  background: var(--bg-input); border: 1px solid var(--border-base);
  border-radius: var(--radius-lg); padding: var(--sp-2) var(--sp-2) var(--sp-2) var(--sp-5);
  transition: border-color var(--duration-fast) var(--ease-out),
              box-shadow var(--duration-fast) var(--ease-out),
              background var(--duration-fast) var(--ease-out);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  box-shadow: var(--shadow-sm);
}
.input-wrapper:focus-within {
  border-color: var(--border-accent);
  box-shadow: 0 0 0 3px var(--bg-accent-soft), var(--shadow-md);
  background: var(--bg-surface);
}

#messageInput {
  flex: 1; border: none; outline: none; background: transparent;
  font-family: var(--font-body); font-size: var(--text-md);
  color: var(--text-base); resize: none; padding: var(--sp-2) 0;
  min-height: 24px; max-height: 200px; line-height: 1.5;
}
#messageInput::placeholder { color: var(--text-faint); font-weight: 400; }

.btn-send {
  display: flex; align-items: center; justify-content: center;
  width: 38px; height: 38px; border-radius: var(--radius-md);
  border: none; background: var(--bg-accent); color: var(--text-inverse);
  cursor: pointer; flex-shrink: 0;
  transition: all var(--duration-fast) var(--ease-spring);
  box-shadow: 0 2px 8px rgba(201, 122, 74, 0.2);
}
.btn-send svg { display: block; }
.btn-send:hover { transform: scale(1.06) translateY(-1px); box-shadow: 0 4px 16px rgba(201, 122, 74, 0.3); }
.btn-send:active { transform: scale(0.92); }
.btn-send:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

/* Stop mode — replaces send button during streaming */
.btn-send.stop-mode { background: var(--bg-surface); color: var(--text-danger); border: 1px solid var(--border-base); box-shadow: none; }

/* ══════════════════════════════════════════════════════════════
   Sidebar — Session History
   ══════════════════════════════════════════════════════════════ */
.sidebar {
  position: fixed; top: 0; left: 0; height: 100%; width: 0;
  z-index: 50; background: var(--bg-elevated);
  display: flex; flex-direction: column; overflow: hidden;
  transition: width var(--duration-normal) var(--ease-out);
}
.sidebar.open { width: 280px; border-right: 1px solid var(--border-base); box-shadow: var(--shadow-lg); }

.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--sp-3) var(--sp-3); border-bottom: 1px solid var(--border-base);
  flex-shrink: 0; min-height: 49px;
}

.header-sidebar-btn {
  display: flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: var(--radius-sm);
  border: 1px solid var(--border-base); background: var(--bg-surface);
  color: var(--text-muted); cursor: pointer; flex-shrink: 0;
  transition: all var(--duration-fast) var(--ease-out);
  margin-right: var(--sp-1);
}
.header-sidebar-btn svg { width: 16px; height: 16px; display: block; }
.header-sidebar-btn:hover { background: var(--bg-surface-hover); border-color: var(--border-strong); color: var(--text-base); }
.header-sidebar-btn.active { background: var(--bg-accent-soft); border-color: var(--border-accent); color: var(--text-accent); }

.sidebar-title {
  font-size: var(--text-xs); font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap;
}
.sidebar-close {
  display: flex; align-items: center; justify-content: center;
  width: 24px; height: 24px; border-radius: var(--radius-sm);
  border: none; background: transparent; color: var(--text-faint);
  cursor: pointer; flex-shrink: 0;
  transition: all var(--duration-fast) var(--ease-out);
}
.sidebar-close svg { width: 12px; height: 12px; display: block; }
.sidebar-close:hover { background: var(--bg-surface-hover); color: var(--text-base); }
.sidebar-body { flex: 1; overflow-y: auto; overflow-x: hidden; }

/* Group header */
.sidebar-group-header {
  display: flex; align-items: center; gap: 6px;
  padding: 8px var(--sp-3); cursor: pointer;
  font-size: var(--text-xs); font-weight: 600; color: var(--text-muted);
  border-bottom: 1px solid var(--border-base); user-select: none;
  transition: background var(--duration-fast);
}
.sidebar-group-header:hover { background: var(--bg-surface-hover); }
.sidebar-group-header.active { color: var(--text-accent); background: var(--bg-accent-soft); }

.sidebar-group-chevron {
  width: 12px; height: 12px; flex-shrink: 0; opacity: 0.5;
  transition: transform 0.2s var(--ease-out);
}
.sidebar-group-chevron svg { width: 12px; height: 12px; display: block; }
.sidebar-group-chevron.open { transform: rotate(90deg); }

.sidebar-group-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.sidebar-group-count {
  flex-shrink: 0; font-size: var(--text-2xs); font-weight: 500;
  padding: 1px 7px; border-radius: var(--radius-full);
  background: var(--bg-surface); color: var(--text-faint);
  font-variant-numeric: tabular-nums;
}
.sidebar-group-items { overflow: hidden; transition: max-height 0.3s var(--ease-out); }
.sidebar-group-items.collapsed { max-height: 0 !important; }

/* Session item */
.sidebar-item {
  display: flex; flex-direction: column;
  padding: var(--sp-2) var(--sp-3) var(--sp-2) var(--sp-5);
  cursor: pointer; transition: background var(--duration-fast);
  border-left: 2px solid transparent;
}
.sidebar-item:hover { background: var(--bg-surface-hover); }
.sidebar-item.active { background: var(--bg-accent-soft); border-left-color: var(--text-accent); }
.sidebar-item-cwd { font-size: var(--text-2xs); font-family: var(--font-mono); color: var(--text-accent); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.3; }
.sidebar-item-title { font-size: var(--text-xs); color: var(--text-base); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.4; margin-top: 1px; }
.sidebar-item-meta {
  font-size: var(--text-2xs); color: var(--text-faint); font-family: var(--font-mono);
  margin-top: 2px; display: flex; gap: var(--sp-2); font-variant-numeric: tabular-nums;
}
.sidebar-loading { display: flex; align-items: center; justify-content: center; padding: var(--sp-8) var(--sp-2); gap: var(--sp-2); font-size: var(--text-xs); color: var(--text-faint); }
.sidebar-empty { padding: var(--sp-8) var(--sp-3); text-align: center; font-size: var(--text-xs); color: var(--text-faint); }
.sidebar-error { padding: var(--sp-6) var(--sp-3); text-align: center; font-size: var(--text-xs); color: var(--text-danger); }

/* Sidebar footer */
.sidebar-footer { display: none; flex-shrink: 0; padding: var(--sp-2) var(--sp-2); border-top: 1px solid var(--border-base); }
.sidebar.open .sidebar-footer { display: block; }

.btn-new-session {
  display: flex; align-items: center; justify-content: center; gap: var(--sp-1);
  width: 100%; padding: var(--sp-2); border-radius: var(--radius-sm);
  border: 1px dashed var(--border-base); background: transparent;
  color: var(--text-muted); cursor: pointer; font-size: var(--text-xs);
  font-family: var(--font-body); transition: all var(--duration-fast);
}
.btn-new-session:hover { border-color: var(--border-accent); background: var(--bg-accent-soft); color: var(--text-accent); }

/* Dialog / Modal */
.dialog-overlay {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(0, 0, 0, 0.45); align-items: center; justify-content: center;
}
.dialog-overlay.open { display: flex; }

.dialog {
  background: var(--bg-elevated); border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
  width: 400px; max-width: 90vw; padding: var(--sp-5);
  animation: dialog-in 0.2s var(--ease-out);
}
@keyframes dialog-in {
  from { opacity: 0; transform: scale(0.95) translateY(-8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.dialog-title { font-size: var(--text-sm); font-weight: 600; color: var(--text-base); margin-bottom: var(--sp-4); }
.dialog-label { display: block; font-size: var(--text-2xs); font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--sp-1); }
.dialog-input {
  width: 100%; padding: var(--sp-2) var(--sp-3); border-radius: var(--radius-sm);
  border: 1px solid var(--border-base); background: var(--bg-input);
  color: var(--text-base); font-size: var(--text-sm); font-family: var(--font-mono);
  outline: none; transition: border-color var(--duration-fast); margin-bottom: var(--sp-4);
}
.dialog-input:focus { border-color: var(--border-accent); }
.dialog-actions { display: flex; justify-content: flex-end; gap: var(--sp-2); }
.dialog-btn {
  padding: var(--sp-2) var(--sp-4); border-radius: var(--radius-sm);
  border: 1px solid var(--border-base); background: var(--bg-surface);
  color: var(--text-base); cursor: pointer; font-size: var(--text-xs);
  font-family: var(--font-body); transition: all var(--duration-fast);
}
.dialog-btn:hover { background: var(--bg-surface-hover); }
.dialog-btn.primary { background: var(--bg-accent); border-color: var(--bg-accent); color: var(--text-inverse); }
.dialog-btn.primary:hover { opacity: 0.9; }

/* Sidebar backdrop (mobile) */
.sidebar-backdrop {
  display: none; position: fixed; inset: 0; z-index: 49;
  background: rgba(0, 0, 0, 0.35); backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
}

/* ══════════════════════════════════════════════════════════════
   Responsive
   ══════════════════════════════════════════════════════════════ */
@media (max-width: 768px) {
  #app { padding: 0 var(--sp-4); }
  .header {
    padding: var(--sp-3) 0; padding-left: calc(50vw - 50% + var(--sp-4));
    padding-right: calc(50vw - 50% + var(--sp-4)); gap: var(--sp-2);
  }
  .header-cwd { display: none; }
  .model-badge { font-size: var(--text-xs); padding: 2px 10px; }
  .model-name { max-width: 100px; }
  .messages-container { padding-top: var(--sp-4); padding-bottom: var(--sp-4); }
  .messages-list { gap: var(--sp-4); }
  .message-content { font-size: var(--text-base) !important; }
  .message.user .message-content { padding: var(--sp-2) var(--sp-4); max-width: 92%; }
  .message-content pre { font-size: var(--text-sm); padding: var(--sp-3); }
  .tool-card-header { padding: var(--sp-2) var(--sp-3); }
  .tool-subtitle { display: none; }
  .input-container { padding: var(--sp-3) 0 var(--sp-4); }
  .input-wrapper { padding: var(--sp-1) var(--sp-1) var(--sp-1) var(--sp-4); border-radius: var(--radius-md); }
  #messageInput { font-size: var(--text-base); }
  .empty-state { padding: var(--sp-10) var(--sp-4); }
  .empty-state-title { font-size: var(--text-xl); }
  .thinking-indicator .thinking-dots { display: none; }

  .sidebar.open { width: 280px; }
  .sidebar.open + .sidebar-backdrop { display: block; }
  .sidebar-header { min-height: 44px; }
  .header-sidebar-btn { width: 26px; height: 26px; }
}

@media (max-width: 480px) {
  #app { padding: 0 var(--sp-3); }
  .header {
    padding: var(--sp-2) 0; padding-left: calc(50vw - 50% + var(--sp-3));
    padding-right: calc(50vw - 50% + var(--sp-3));
  }
  .header-left { gap: var(--sp-2); }
  .header-logo { width: 28px; height: 28px; font-size: var(--text-md); }
  .model-badge { font-size: var(--text-2xs); padding: 2px 8px; }
  .model-name { display: none; }
  .model-sep { display: none; }
  .message.user .message-content { max-width: 100%; border-radius: var(--radius-md) var(--radius-md) var(--radius-sm) var(--radius-md); }
  .tool-status { font-size: var(--text-2xs); padding: 1px 6px; }
  .thinking-indicator { font-size: var(--text-2xs); padding: 2px 10px; }
  .dialog { width: 95vw; padding: var(--sp-4); }

  .sidebar.open { width: 85vw; max-width: 300px; }
  .sidebar-header { min-height: 40px; }
  .header-sidebar-btn { width: 24px; height: 24px; }
  .sidebar-item { padding: var(--sp-2) var(--sp-2) var(--sp-2) var(--sp-4); }
  .sidebar-item-cwd { font-size: var(--text-2xs); }
  .sidebar-item-title { font-size: var(--text-xs); }
  .sidebar-item-meta { font-size: var(--text-2xs); }
}
</style>
<script src="marked.js"></script>
</head>
<body>
<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-title">Sessions</span>
    <button class="sidebar-close" id="sidebarClose" aria-label="Close sidebar">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>
    </button>
  </div>
  <div class="sidebar-body" id="sidebarBody">
    <div class="sidebar-loading"><div class="spinner"></div></div>
  </div>
  <div class="sidebar-footer">
    <button class="btn-new-session" id="btnNewSession">+ New session</button>
  </div>
</aside>

<!-- New Session Dialog -->
<div class="dialog-overlay" id="newSessionDialog">
  <div class="dialog">
    <div class="dialog-title">New Session</div>
    <label class="dialog-label">Working directory</label>
    <input class="dialog-input" id="newSessionCwdInput" type="text" placeholder="/path/to/project" autocomplete="off" spellcheck="false">
    <div class="dialog-actions">
      <button class="dialog-btn" id="btnDialogCancel">Cancel</button>
      <button class="dialog-btn primary" id="btnDialogCreate">Create</button>
    </div>
  </div>
</div>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<div id="app">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <button class="header-sidebar-btn" id="sidebarToggle" aria-label="Toggle sessions" title="Sessions (Ctrl+B)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 4h12M2 8h12M2 12h12"/>
        </svg>
      </button>
      <div class="model-badge" id="modelBadge" title="Click to switch model" tabindex="0">
        <span class="model-provider" id="modelProvider">-</span>
        <span class="model-sep">/</span>
        <span class="model-name" id="modelName">no model</span>
        <svg class="model-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6l4 4 4-4"/></svg>
      </div>
      <div class="header-cwd" id="headerCwd" title="Current directory">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 4a2 2 0 0 1 2-2h3.17a2 2 0 0 1 1.41.59l1.42 1.41a2 2 0 0 0 1.41.59H13a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4z"/>
        </svg>
        <span>-</span>
      </div>
    </div>
    <div class="header-right">
      <span class="connection-chip disconnected" id="connectionDot" title="Disconnected">
        <span class="connection-chip-dot"></span>
        <span class="connection-chip-label">disconnected</span>
      </span>
      <div class="thinking-indicator hidden" id="thinkingIndicator">
        <span>thinking</span>
        <div class="thinking-dots"><span></span><span></span><span></span></div>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span id="themeIcon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        </span>
      </button>
    </div>
  </header>

  <!-- Messages -->
  <div class="messages-viewport">
    <div class="messages-container" id="messagesContainer">
      <div class="messages-list" id="messagesList">
        <div class="empty-state" id="emptyState">
          <div class="empty-state-icon">π</div>
          <div class="empty-state-title">session web ui</div>
          <div class="empty-state-desc">Your conversation with pi appears here. Every message, tool call, and response streams in real time.</div>
          <div class="empty-state-hint">press <kbd>/</kbd> to start typing</div>
        </div>
      </div>
    </div>
    <button class="scroll-bottom-btn" id="scrollBottomBtn" aria-label="Scroll to bottom" title="Scroll to bottom">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 8 11 13 6"/></svg>
      <span class="badge"></span>
    </button>
  </div>

  <!-- Input -->
  <div class="input-container">
    <div class="input-wrapper">
      <textarea id="messageInput" placeholder="Message pi..." rows="1"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
      <button class="btn-send" id="btnSend" aria-label="Send message" disabled>
        <span class="btn-send-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4 20-7z"/></svg>
        </span>
      </button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
