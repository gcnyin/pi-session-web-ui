<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>pi — session web ui</title>
<!-- Using system-local fonts for consistent cross-platform experience -->
<style>
/* ══════════════════════════════════════════════════════════════
   CSS Custom Properties — Theming
   ══════════════════════════════════════════════════════════════ */
:root {
  /* Typography — CJK-first for Chinese readability, with Latin fallbacks */
  --font-display: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', 'WenQuanYi Micro Hei', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-body: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', 'WenQuanYi Micro Hei', system-ui, -apple-system, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Noto Sans', 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'SF Mono', 'IBM Plex Mono', 'Menlo', Monaco, Consolas, 'Ubuntu Mono', 'Noto Sans Mono', 'Sarasa Mono SC', 'Noto Sans Mono CJK SC', 'Source Han Mono SC', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', monospace;

  /* Modular type scale */
  --text-2xs: 0.6875rem;  /* 11px  - micro labels, tool status */
  --text-xs:  0.75rem;    /* 12px  - meta, captions, hints */
  --text-sm:  0.8125rem;  /* 13px  - secondary, popup items, code */
  --text-base: 0.875rem;  /* 14px  - body, tool labels, dialog input */
  --text-md:  0.9375rem;  /* 15px  - main content, user pill, h4 */
  --text-lg:  1rem;       /* 16px  - emphasis, h3, scroll arrow */
  --text-xl:  1.25rem;    /* 20px  - h2, empty title */
  --text-2xl: 1.5rem;     /* 24px  - h1 */

  /* Spacing */
  --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
  --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px; --sp-12: 48px; --sp-16: 64px;

  /* Radii — soft, friendly rounding */
  --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px;
  --radius-full: 9999px;

  /* Easing */
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);

  /* Duration */
  --duration-fast: 150ms;
  --duration-normal: 250ms;
  --duration-slow: 400ms;
  --duration-reveal: 600ms;

  /* Shadows — tighter, more precise */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.03);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.03);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.03);
  --shadow-glow: 0 0 30px rgba(201, 122, 74, 0.06);

  /* Tool icon colors — base values; themes override with darker variants */
  --tool-bash:     #d9935a;
  --tool-read:     #6b8ebf;
  --tool-edit:     #4aba8c;
  --tool-write:    #b87a4a;
  --tool-grep:     #e6aa46;
  --tool-list:     #a09080;
  --tool-web:      #6b8ebf;
  --tool-task:     #be8cc8;
  --tool-question: #b4a0d2;
  --tool-mcp:      #96a5c3;
}

/* ── Dark theme (warm charcoal & copper) ── */
[data-theme="dark"] {
  --bg-base: #1a1410;
  --bg-surface: #221a15;
  --bg-surface-hover: #2a2019;
  --bg-elevated: #2c221a;
  --bg-input: rgba(34, 26, 21, 0.92);
  --bg-code: #1f1813;
  --bg-tool: #221a15;
  --bg-accent: #e09060;
  --bg-accent-soft: rgba(224, 144, 96, 0.15);
  --bg-accent-glow: rgba(224, 144, 96, 0.08);
  --bg-danger: rgba(248, 113, 113, 0.12);
  --bg-success: rgba(74, 222, 128, 0.10);

  --text-base: #ece2d3;
  --text-muted: #a89c8c;
  --text-faint: #7a6e5e;
  --text-inverse: #1a1410;
  --text-accent: #e09060;
  --text-accent-dim: #c07848;
  --text-danger: #f87171;
  --text-success: #4ade80;
  --text-link: #6ea8fe;

  --border-base: rgba(255, 255, 255, 0.08);
  --border-strong: rgba(255, 255, 255, 0.14);
  --border-accent: rgba(224, 144, 96, 0.30);

  --scrollbar-thumb: rgba(255, 255, 255, 0.10);
  --scrollbar-thumb-hover: rgba(255, 255, 255, 0.18);

  --glow-primary: radial-gradient(ellipse 65% 35% at 50% 15%, rgba(224, 144, 96, 0.08) 0%, transparent 100%);
  --noise-opacity: 0.025;
}

/* ── Light theme (warm cream / copper) — selected via theme toggle */
[data-theme="light"] {
  --bg-base: #f8f4ef;
  --bg-surface: #fdfaf6;
  --bg-surface-hover: #f2ede6;
  --bg-elevated: #fefcf8;
  --bg-input: rgba(255, 255, 255, 0.85);
  --bg-code: #f0eae2;
  --bg-tool: #f2ede6;
  --bg-accent: #c08050;
  --bg-accent-soft: rgba(192, 128, 80, 0.12);
  --bg-accent-glow: rgba(192, 128, 80, 0.06);
  --bg-danger: rgba(239, 68, 68, 0.08);
  --bg-success: rgba(74, 222, 128, 0.08);

  --text-base: #2c241c;
  --text-muted: #7a6c5e;
  --text-faint: #a09080;
  --text-inverse: #ffffff;
  --text-accent: #b07040;
  --text-accent-dim: #905830;
  --text-danger: #dc2626;
  --text-success: #16a34a;
  --text-link: #5b7fff;

  --border-base: rgba(0, 0, 0, 0.06);
  --border-strong: rgba(0, 0, 0, 0.10);
  --border-accent: rgba(192, 128, 80, 0.25);

  --scrollbar-thumb: rgba(0, 0, 0, 0.08);
  --scrollbar-thumb-hover: rgba(0, 0, 0, 0.14);

  --glow-primary: radial-gradient(ellipse 65% 35% at 50% 15%, rgba(192, 128, 80, 0.06) 0%, transparent 100%);
  --noise-opacity: 0.015;

  /* Tool icon overrides — darker for legibility on cream background */
  --tool-bash:     #a85f2a;
  --tool-read:     #4a6b9c;
  --tool-edit:     #2d8a64;
  --tool-write:    #8a5a30;
  --tool-grep:     #b08320;
  --tool-list:     #6e5e50;
  --tool-web:      #4a6b9c;
  --tool-task:     #8a5da0;
  --tool-question: #7a5fa0;
  --tool-mcp:      #6078a0;
}

/* ── System preference ── */
@media (prefers-color-scheme: dark) {
  [data-theme="system"] {
    --bg-base: #1a1410;
    --bg-surface: #221a15;
    --bg-surface-hover: #2a2019;
    --bg-elevated: #2c221a;
    --bg-input: rgba(34, 26, 21, 0.92);
    --bg-code: #1f1813;
    --bg-tool: #221a15;
    --bg-accent: #e09060;
    --bg-accent-soft: rgba(224, 144, 96, 0.15);
    --bg-accent-glow: rgba(224, 144, 96, 0.08);
    --bg-danger: rgba(248, 113, 113, 0.12);
    --bg-success: rgba(74, 222, 128, 0.10);

    --text-base: #ece2d3;
    --text-muted: #a89c8c;
    --text-faint: #7a6e5e;
    --text-inverse: #1a1410;
    --text-accent: #e09060;
    --text-accent-dim: #c07848;
    --text-danger: #f87171;
    --text-success: #4ade80;
    --text-link: #6ea8fe;

    --border-base: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.14);
    --border-accent: rgba(224, 144, 96, 0.30);

    --scrollbar-thumb: rgba(255, 255, 255, 0.10);
    --scrollbar-thumb-hover: rgba(255, 255, 255, 0.18);

    --glow-primary: radial-gradient(ellipse 65% 35% at 50% 15%, rgba(224, 144, 96, 0.08) 0%, transparent 100%);
    --noise-opacity: 0.025;
  }
}

@media (prefers-color-scheme: light) {
  [data-theme="system"] {
    --bg-base: #f8f4ef;
    --bg-surface: #fdfaf6;
    --bg-surface-hover: #f2ede6;
    --bg-elevated: #fefcf8;
    --bg-input: rgba(255, 255, 255, 0.85);
    --bg-code: #f0eae2;
    --bg-tool: #f2ede6;
    --bg-accent: #c08050;
    --bg-accent-soft: rgba(192, 128, 80, 0.12);
    --bg-accent-glow: rgba(192, 128, 80, 0.06);
    --bg-danger: rgba(239, 68, 68, 0.08);
    --bg-success: rgba(74, 222, 128, 0.08);

    --border-strong: rgba(0, 0, 0, 0.10);

    --scrollbar-thumb-hover: rgba(0, 0, 0, 0.14);

    --glow-primary: radial-gradient(ellipse 65% 35% at 50% 15%, rgba(192, 128, 80, 0.06) 0%, transparent 100%);
    --noise-opacity: 0.015;

    /* Tool icon overrides — darker for legibility on cream background */
    --tool-bash:     #a85f2a;
    --tool-read:     #4a6b9c;
    --tool-edit:     #2d8a64;
    --tool-write:    #8a5a30;

    --tool-web:      #4a6b9c;

/* ══════════════════════════════════════════════════════════════
   Noise Texture (CSS-only grain)
   ══════════════════════════════════════════════════════════════ */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  opacity: var(--noise-opacity, 0.03);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px 256px;
  pointer-events: none;
  z-index: 9999;
  mix-blend-mode: overlay;
}

/* ══════════════════════════════════════════════════════════════
   Reset & Base
   ══════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  height: 100%;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  height: 100%;
  font-family: var(--font-body);
  background: var(--bg-base);
  color: var(--text-base);
  line-height: 1.55;
  overflow: hidden;
  transition: background var(--duration-normal) var(--ease-out), color var(--duration-normal) var(--ease-out);
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }

::selection {
  background: var(--bg-accent);
  color: var(--text-inverse);
}

/* ══════════════════════════════════════════════════════════════
   App Layout
   ══════════════════════════════════════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 980px;
  margin: 0 auto;
  padding: 0 var(--sp-6);
  position: relative;
  /* Only the glow overlay — no base color, no shadow, seamless with body */
  background: var(--glow-primary);
}

/* ══════════════════════════════════════════════════════════════
   Connection Status — chip with dot in header-right
   ══════════════════════════════════════════════════════════════ */
.connection-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  height: 32px;
  padding: 0 var(--sp-3);
  border-radius: var(--radius-sm);
  background: var(--bg-surface);
  border: 1px solid var(--border-base);
  font-size: var(--text-xs);
  font-weight: 500;
  color: var(--text-muted);
  flex-shrink: 0;
  cursor: default;
  user-select: none;
  box-sizing: border-box;
  transition: border-color var(--duration-normal) var(--ease-out);
  font-variant-numeric: tabular-nums;
}

.connection-chip-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: background var(--duration-normal) var(--ease-out);
}

.connection-chip-label {
  text-transform: capitalize;
  line-height: 1;
}

.connection-chip.connected { border-color: rgba(74, 222, 128, 0.25); }
.connection-chip.connected .connection-chip-dot { background: #4ade80; box-shadow: 0 0 5px rgba(74, 222, 128, 0.4); }

.connection-chip.disconnected { border-color: rgba(239, 68, 68, 0.2); }
.connection-chip.disconnected .connection-chip-dot { background: #ef4444; box-shadow: 0 0 4px rgba(239, 68, 68, 0.35); }

.connection-chip.reconnecting { border-color: rgba(251, 191, 36, 0.25); }
.connection-chip.reconnecting .connection-chip-dot { background: #fbbf24; box-shadow: 0 0 5px rgba(251, 191, 36, 0.4); animation: pulse-dot 1.5s ease-in-out infinite; }

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

/* ══════════════════════════════════════════════════════════════
   Header
   ══════════════════════════════════════════════════════════════ */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--sp-4) 0;
  gap: var(--sp-3);
  flex-shrink: 0;
  border-bottom: 1px solid var(--border-base);
  position: relative;
  z-index: 10;
  /* Full-width: break out of #app's max-width, content stays aligned */
  width: 100vw;
  margin-left: calc(-50vw + 50%);
  padding-left: calc(50vw - 50% + var(--sp-6));
  padding-right: calc(50vw - 50% + var(--sp-6));
}

.header-left {
  display: flex;
  align-items: center;
  gap: var(--sp-4);
  min-width: 0;
  flex: 1;
}

.header-right {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  flex-shrink: 0;
}

/* Logo mark — editorial π */
.header-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  background: var(--bg-surface);
  border: 1px solid var(--border-strong);
  color: var(--text-accent);
  font-family: var(--font-mono);
  font-size: var(--text-lg);
  font-weight: 600;
  line-height: 1;
  flex-shrink: 0;
  cursor: default;
  user-select: none;
  transition: all var(--duration-fast) var(--ease-out);
}

.model-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  height: 32px;
  font-size: var(--text-xs);
  white-space: nowrap;
  min-width: 0;
  padding: 0 var(--sp-3);
  background: var(--bg-surface);
  border: 1px solid var(--border-base);
  border-radius: var(--radius-sm);
  box-sizing: border-box;
  transition: all var(--duration-fast) var(--ease-out);
  letter-spacing: -0.01em;
  cursor: pointer;
  position: relative;
}

.model-badge:hover {
  border-color: var(--border-accent);
  background: var(--bg-surface-hover);
}

.model-chevron {
  width: 10px;
  height: 10px;
  flex-shrink: 0;
  opacity: 0.4;
  transition: transform var(--duration-fast) var(--ease-out);
}

.model-badge:hover .model-chevron {
  opacity: 0.7;
}

.model-provider {
  font-weight: 600;
  color: var(--text-accent);
  text-transform: uppercase;
  font-size: var(--text-xs);
  letter-spacing: 0.06em;
  line-height: 1;
}

.model-sep {
  color: var(--text-faint);
  font-size: var(--text-xs);
  font-weight: 300;
  line-height: 1;
}

.model-name {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--text-muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.header-cwd {
  display: flex;
  align-items: center;
  gap: var(--sp-1);
  height: 32px;
  font-size: var(--text-xs);
  color: var(--text-faint);
  font-family: var(--font-mono);
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding: 0 var(--sp-2);
  border-radius: var(--radius-sm);
  background: var(--bg-surface);
  border: 1px solid var(--border-base);
  box-sizing: border-box;
  transition: all var(--duration-fast) var(--ease-out);
  font-variant-numeric: tabular-nums;
}

.header-cwd:hover {
  border-color: var(--border-strong);
}

.header-cwd svg {
  flex-shrink: 0;
  width: 12px;
  height: 12px;
  opacity: 0.6;
}

/* Thinking indicator */
.thinking-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  height: 32px;
  font-size: var(--text-xs);
  color: var(--text-accent);
  font-weight: 500;
  padding: 0 var(--sp-3);
  border-radius: var(--radius-sm);
  background: var(--bg-accent-soft);
  border: 1px solid var(--border-accent);
  box-sizing: border-box;
  animation: think-glow 2s ease-in-out infinite;
}

@keyframes think-glow {
  0%, 100% { box-shadow: 0 0 0 0 var(--bg-accent-glow); }
  50% { box-shadow: 0 0 16px 2px var(--bg-accent-glow); }
}

.thinking-dots {
  display: flex;
  gap: 3px;
}

.thinking-dots span {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--text-accent);
  animation: thinkBounce 1.4s infinite ease-in-out both;
}

.thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
.thinking-dots span:nth-child(2) { animation-delay: -0.16s; }
.thinking-dots span:nth-child(3) { animation-delay: 0s; }

@keyframes thinkBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* Theme toggle */
.theme-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-base);
  background: var(--bg-surface);
  color: var(--text-muted);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out);
  font-size: var(--text-md);
  line-height: 1;
  position: relative;
}

.theme-toggle:hover {
  background: var(--bg-surface-hover);
  border-color: var(--border-strong);
  color: var(--text-base);
  transform: translateY(-1px);
}

.theme-toggle:active {
  transform: scale(0.92);
}

/* Interrupt button — removed from header, now combined with send button */

.hidden {
  display: none !important;
}

/* ── Model Select Popup ── */
.model-popup {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  min-width: 240px;
  max-width: 360px;
  max-height: 320px;
  overflow-y: auto;
  background: var(--bg-elevated);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  z-index: 100;
  padding: var(--sp-1) 0;
  animation: popup-enter var(--duration-fast) var(--ease-out);
}

@keyframes popup-enter {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

.model-popup-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--sp-2) var(--sp-3);
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border-bottom: 1px solid var(--border-base);
}

.model-popup-item {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-3);
  cursor: pointer;
  transition: background var(--duration-fast) var(--ease-out);
  font-size: var(--text-sm);
  line-height: 1.4;
}

.model-popup-item:hover {
  background: var(--bg-surface-hover);
}

.model-popup-item.active {
  background: var(--bg-accent-soft);
  color: var(--text-accent);
}

.model-popup-item .popup-provider {
  font-size: var(--text-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-accent);
  flex-shrink: 0;
  min-width: 52px;
}

.model-popup-item .popup-name {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  color: var(--text-base);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.model-popup-item .popup-check {
  margin-left: auto;
  font-size: var(--text-xs);
  color: var(--text-accent);
  flex-shrink: 0;
}

.model-popup-loading {
  padding: var(--sp-4);
  text-align: center;
  font-size: var(--text-sm);
  color: var(--text-muted);
}

.model-popup-error {
  padding: var(--sp-3);
  text-align: center;
  font-size: var(--text-xs);
  color: var(--text-danger);
}

/* ══════════════════════════════════════════════════════════════
   Messages Container
   ══════════════════════════════════════════════════════════════ */
/* ── Messages viewport (positioning anchor, no overflow) ── */
.messages-viewport {
  flex: 1;
  position: relative;
  min-height: 0;
}

.messages-container {
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  padding: var(--sp-6) 0;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  /* Extend to viewport edges so scrollbar sits at the far right */
  width: 100vw;
  margin-left: calc(-50vw + 50%);
  padding-left: calc(50vw - 50% + var(--sp-6));
  padding-right: calc(50vw - 50% + var(--sp-6));
}

.messages-list {
  display: flex;
  flex-direction: column;
  gap: var(--sp-5);
  position: relative;
}

/* Scroll-to-bottom floating button */
.scroll-bottom-btn {
  position: absolute;
  bottom: var(--sp-5);
  right: var(--sp-5);
  z-index: 20;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border-base);
  background: var(--bg-surface);
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--text-lg);
  box-shadow: var(--shadow-md);
  opacity: 0;
  transform: translateY(8px);
  pointer-events: none;
  transition: opacity var(--duration-normal) var(--ease-out),
              transform var(--duration-normal) var(--ease-out),
              background var(--duration-fast) var(--ease-out),
              color var(--duration-fast) var(--ease-out);
}

.scroll-bottom-btn.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.scroll-bottom-btn:hover {
  background: var(--bg-surface-hover);
  color: var(--text-base);
  border-color: var(--border-strong);
  transform: translateY(-1px);
}

.scroll-bottom-btn:active {
  transform: scale(0.92);
}

.scroll-bottom-btn .badge {
  position: absolute;
  top: -4px;
  right: -4px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--bg-accent);
  border: 2px solid var(--bg-base);
  opacity: 0;
  transition: opacity var(--duration-fast);
}

.scroll-bottom-btn.visible .badge.streaming {
  opacity: 1;
  animation: pulse-dot 1.5s ease-in-out infinite;
}

/* Staggered entry animation for messages */
@keyframes message-enter {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.message {
  animation: message-enter var(--duration-slow) var(--ease-out) both;
}

/* ══════════════════════════════════════════════════════════════
   Empty State
   ══════════════════════════════════════════════════════════════ */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: var(--sp-16) var(--sp-6);
  flex: 1;
  gap: var(--sp-4);
  animation: message-enter var(--duration-reveal) var(--ease-out);
}

.empty-state.hidden {
  display: none;
}

.empty-state-icon {
  font-family: var(--font-mono);
  font-size: 3rem;
  font-weight: 500;
  color: var(--text-accent);
  opacity: 0.35;
  line-height: 1;
  letter-spacing: -0.02em;
  transition: opacity var(--duration-normal) var(--ease-out);
}

.empty-state:hover .empty-state-icon {
  opacity: 0.5;
}

.empty-state-title {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: 500;
  color: var(--text-muted);
  line-height: 1.3;
  letter-spacing: -0.01em;
}

.empty-state-desc {
  font-size: var(--text-base);
  color: var(--text-faint);
  max-width: 360px;
  line-height: 1.5;
}

.empty-state-hint {
  font-size: var(--text-xs);
  color: var(--text-faint);
  padding: var(--sp-2) var(--sp-4);
  border-radius: var(--radius-full);
  background: var(--bg-surface);
  border: 1px solid var(--border-base);
  font-family: var(--font-mono);
  letter-spacing: -0.01em;
}

/* ══════════════════════════════════════════════════════════════
   Message — Editorial Style
   ══════════════════════════════════════════════════════════════ */
.message-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp-2);
  padding: var(--sp-1) 0;
  border-radius: var(--radius-sm);
  margin-bottom: var(--sp-1);
}

.message-role {
  font-size: var(--text-2xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-faint);
}

.message-meta {
  font-size: var(--text-2xs);
  color: var(--text-faint);
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  opacity: 0.6;
}

/* ══════════════════════════════════════════════════════════════
   Assistant Message (editorial — no bubble)
   ══════════════════════════════════════════════════════════════ */
.message.assistant {
  display: flex;
  flex-direction: column;
  gap: var(--sp-3);
}

.message.assistant .message-header {
  margin-bottom: 0;
}

.message.assistant .message-content {
  font-size: var(--text-md);
  line-height: 1.6;
  color: var(--text-base);
  overflow-wrap: break-word;
  word-break: break-word;
  padding: 0;
}

/* Markdown content — clean technical typography */
.message-content h1,
.message-content h2,
.message-content h3,
.message-content h4 {
  font-family: var(--font-display);
  font-weight: 600;
  color: var(--text-base);
  margin-top: 1.2em;
  margin-bottom: 0.4em;
  line-height: 1.3;
  letter-spacing: -0.01em;
}

.message-content h1 { font-size: var(--text-2xl); }
.message-content h2 { font-size: var(--text-xl); }
.message-content h3 { font-size: var(--text-lg); }
.message-content h4 {
  font-size: var(--text-md);
  font-weight: 700;
  color: var(--text-accent);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.message-content h1:first-child,
.message-content h2:first-child,
.message-content h3:first-child {
  margin-top: 0;
}

.message-content p {
  margin: 0.7em 0;
}

.message-content p:first-child { margin-top: 0; }
.message-content p:last-child { margin-bottom: 0; }

.message-content ul,
.message-content ol {
  padding-left: 1.5em;
  margin: 0.6em 0;
}

.message-content li {
  margin: 0.3em 0;
}

.message-content strong {
  font-weight: 600;
  color: var(--text-base);
}

.message-content blockquote {
  border-left: 3px solid var(--border-accent);
  padding-left: var(--sp-4);
  margin: 0.8em 0;
  color: var(--text-muted);
  font-style: italic;
}

.message-content a {
  color: var(--text-link);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color var(--duration-fast) var(--ease-out);
}

.message-content a:hover {
  border-bottom-color: var(--text-link);
}

.message-content hr {
  border: none;
  border-top: 1px solid var(--border-base);
  margin: 1.2em 0;
}

.message-content img {
  max-width: 100%;
  border-radius: var(--radius-md);
  margin: 0.8em 0;
  height: auto;
  box-shadow: var(--shadow-md);
}

.message-content table {
  border-collapse: collapse;
  width: 100%;
  margin: 0.8em 0;
  font-size: var(--text-sm);
  border-radius: var(--radius-sm);
  overflow: hidden;
}

.message-content th,
.message-content td {
  border: 1px solid var(--border-base);
  padding: var(--sp-2) var(--sp-3);
  text-align: left;
}

.message-content th {
  background: var(--bg-surface-hover);
  font-weight: 600;
  color: var(--text-base);
  font-size: var(--text-xs);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.message-content td {
  background: transparent;
}

.message-content tbody tr:nth-child(even) td {
  background: var(--bg-surface-hover);
}

/* Code blocks — refined */
.message-content pre {
  background: var(--bg-code);
  border: 1px solid var(--border-base);
  border-radius: var(--radius-md);
  padding: var(--sp-4);
  margin: 0.8em 0;
  overflow-x: auto;
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  line-height: 1.6;
  font-variant-numeric: tabular-nums;
  position: relative;
}

.message-content code {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  font-variant-numeric: tabular-nums;
  background: var(--bg-code);
  padding: 2px 7px;
  border-radius: 4px;
  color: var(--text-accent);
}

.message-content pre code {
  background: none;
  padding: 0;
  border-radius: 0;
  color: var(--text-base);
}

.code-lang {
  position: absolute;
  top: var(--sp-2);
  right: var(--sp-3);
  font-size: var(--text-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-faint);
  opacity: 0.5;
}

.code-copy-btn {
  position: absolute;
  top: var(--sp-2);
  right: var(--sp-3);
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-base);
  background: var(--bg-surface);
  color: var(--text-faint);
  font-size: var(--text-2xs);
  font-family: var(--font-body);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out);
  z-index: 2;
}

.code-copy-btn:hover {
  background: var(--bg-surface-hover);
  color: var(--text-base);
  border-color: var(--border-strong);
}

.code-copy-btn.copied {
  opacity: 1;
  border-color: var(--text-success);
  color: var(--text-success);
}

/* ══════════════════════════════════════════════════════════════
   User Message (pill-style, right-aligned)
   ══════════════════════════════════════════════════════════════ */
.message.user .message-header {
  justify-content: flex-end;
}

/* User messages don't show "you" role — the copper pill already says it visually */
.message.user .message-role {
  display: none;
}

.message.user .message-content {
  background: var(--bg-accent-soft);
  border: 1px solid var(--border-accent);
  border-radius: var(--radius-lg) var(--radius-lg) var(--radius-sm) var(--radius-lg);
  padding: var(--sp-3) var(--sp-5);
  font-size: var(--text-md);
  line-height: 1.5;
  color: var(--text-base);
  overflow-wrap: break-word;
  word-break: break-word;
  white-space: pre-wrap;
  width: fit-content;
  max-width: 85%;
  margin-left: auto;
  box-shadow: var(--shadow-sm);
  transition: box-shadow var(--duration-fast) var(--ease-out);
}

.message.user .message-content:hover {
  box-shadow: var(--shadow-md);
}

/* ══════════════════════════════════════════════════════════════
   Thinking / Reasoning Block
   ══════════════════════════════════════════════════════════════ */
.thinking-block {
  border-left: 2px solid var(--border-accent);
  padding: var(--sp-3) var(--sp-4);
  margin: 0;
  background: var(--bg-accent-soft);
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
  position: relative;
}

.thinking-block::before {
  content: '';
  position: absolute;
  top: 0;
  left: -2px;
  bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom, var(--text-accent), var(--bg-accent));
  border-radius: 1px;
}

.thinking-block .thinking-label {
  font-size: var(--text-2xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-accent);
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  cursor: pointer;
  user-select: none;
  transition: opacity var(--duration-fast) var(--ease-out);
}

.thinking-block .thinking-label:hover {
  opacity: 0.8;
}

.thinking-block .thinking-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-accent);
}

/* Toggle icon */
.thinking-toggle {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  color: var(--text-accent);
  transition: transform var(--duration-fast) var(--ease-out);
}

.thinking-block.open .thinking-toggle {
  transform: rotate(90deg);
}

/* Thinking text — hidden by default, shown when open */
.thinking-block .thinking-text {
  display: none;
}

.thinking-block.open .thinking-text {
  display: block;
}

.thinking-block .thinking-text {
  font-size: var(--text-sm);
  color: var(--text-muted);
  line-height: 1.6;
  white-space: pre-wrap;
  font-variant-numeric: tabular-nums;
}

/* ══════════════════════════════════════════════════════════════
   Tool Card — Redesigned
   ══════════════════════════════════════════════════════════════ */
.tool-card {
  border: 1px solid var(--border-base);
  border-radius: var(--radius-md);
  background: var(--bg-tool);
  overflow: hidden;
  transition: border-color var(--duration-normal) var(--ease-out), box-shadow var(--duration-normal) var(--ease-out);
  animation: message-enter var(--duration-slow) var(--ease-out) both;
}

.tool-card:hover {
  border-color: var(--border-strong);
  box-shadow: var(--shadow-sm);
}

.tool-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp-2);
  padding: var(--sp-3) var(--sp-4);
  cursor: pointer;
  user-select: none;
  transition: background var(--duration-fast) var(--ease-out);
}

.tool-card-header:hover {
  background: var(--bg-surface-hover);
}

.tool-card-info {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  min-width: 0;
  flex: 1;
}

.tool-icon {
  width: 26px;
  height: 26px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: var(--text-xs);
  font-weight: 600;
  letter-spacing: 0;
  transition: transform var(--duration-fast) var(--ease-spring);
}

.tool-card:hover .tool-icon {
  transform: scale(1.05);
}

.tool-icon.bash     { background: color-mix(in oklab, var(--tool-bash)     15%, transparent); color: var(--tool-bash); }
.tool-icon.read     { background: color-mix(in oklab, var(--tool-read)     12%, transparent); color: var(--tool-read); }
.tool-icon.edit     { background: color-mix(in oklab, var(--tool-edit)     12%, transparent); color: var(--tool-edit); }
.tool-icon.write    { background: color-mix(in oklab, var(--tool-write)    12%, transparent); color: var(--tool-write); }
.tool-icon.grep,
.tool-icon.glob     { background: color-mix(in oklab, var(--tool-grep)     12%, transparent); color: var(--tool-grep); }
.tool-icon.list     { background: color-mix(in oklab, var(--tool-list)     12%, transparent); color: var(--tool-list); }
.tool-icon.web      { background: color-mix(in oklab, var(--tool-web)      12%, transparent); color: var(--tool-web); }
.tool-icon.task     { background: color-mix(in oklab, var(--tool-task)     12%, transparent); color: var(--tool-task); }
.tool-icon.question { background: color-mix(in oklab, var(--tool-question) 12%, transparent); color: var(--tool-question); }
.tool-icon.mcp      { background: color-mix(in oklab, var(--tool-mcp)      12%, transparent); color: var(--tool-mcp); }
.tool-icon.default  { background: var(--bg-surface); color: var(--text-muted); }

.tool-label {
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--text-base);
  min-width: 0;
  line-height: 1.3;
}

.tool-subtitle {
  font-size: var(--text-xs);
  color: var(--text-muted);
  font-family: var(--font-mono);
  line-height: 1.4;
  word-break: break-word;
  overflow-wrap: break-word;
  font-variant-numeric: tabular-nums;
}

.tool-status {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: var(--text-2xs);
  font-weight: 500;
  color: var(--text-muted);
  flex-shrink: 0;
  padding: 2px 8px;
  border-radius: var(--radius-full);
  background: var(--bg-surface);
  border: 1px solid var(--border-base);
  font-variant-numeric: tabular-nums;
}

.spinner {
  width: 10px;
  height: 10px;
  border: 2px solid var(--border-base);
  border-top-color: var(--text-accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.dot-success {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #4ade80;
  box-shadow: 0 0 6px rgba(74, 222, 128, 0.4);
}

.dot-error {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #ef4444;
  box-shadow: 0 0 6px rgba(239, 68, 68, 0.4);
}

.chevron {
  width: 14px;
  height: 14px;
  color: var(--text-faint);
  flex-shrink: 0;
  transition: transform var(--duration-fast) var(--ease-out);
}

.chevron.open {
  transform: rotate(90deg);
}

.tool-card-body {
  position: relative;
  border-top: 1px solid var(--border-base);
  padding: var(--sp-4);
  font-size: var(--text-sm);
  line-height: 1.6;
  overflow-x: auto;
  display: none;
}

.tool-card-body.open {
  display: block;
  animation: tool-expand var(--duration-normal) var(--ease-out);
}

@keyframes tool-expand {
  from { opacity: 0; max-height: 0; padding-top: 0; padding-bottom: 0; }
  to { opacity: 1; max-height: 2000px; }
}

.tool-card-body pre {
  background: var(--bg-code);
  border-radius: var(--radius-sm);
  padding: var(--sp-3);
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  line-height: 1.55;
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-word;
  margin: 0;
  border: 1px solid var(--border-base);
  max-height: 300px;
  overflow-y: auto;
}

/* Tool output copy button */
.tool-copy-btn {
  position: absolute;
  top: var(--sp-2);
  right: var(--sp-3);
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-base);
  background: var(--bg-surface);
  color: var(--text-faint);
  font-size: var(--text-2xs);
  font-family: var(--font-body);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out);
  z-index: 2;
}

.tool-copy-btn:hover {
  background: var(--bg-surface-hover);
  color: var(--text-base);
  border-color: var(--border-strong);
}

.tool-copy-btn.copied {
  border-color: var(--text-success);
  color: var(--text-success);
}

.tool-args {
  display: flex;
  flex-wrap: wrap;
  gap: var(--sp-1);
  margin-top: var(--sp-2);
}

.tool-arg {
  display: inline-flex;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--bg-code);
  font-family: var(--font-mono);
  font-size: var(--text-2xs);
  color: var(--text-muted);
  border: 1px solid var(--border-base);
}

/* ══════════════════════════════════════════════════════════════
   Streaming cursor
   ══════════════════════════════════════════════════════════════ */
.streaming-cursor::after {
  content: '▍';
  animation: blink 1s step-end infinite;
  color: var(--text-accent);
  margin-left: 2px;
  font-weight: 400;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* ══════════════════════════════════════════════════════════════
   Input Area — Floating Glass
   ══════════════════════════════════════════════════════════════ */
.input-container {
  flex-shrink: 0;
  padding: var(--sp-4) 0 var(--sp-5);
  position: relative;
  z-index: 10;
}

/* Gradient edge above input */
.input-container::before {
  content: '';
  position: absolute;
  top: -12px;
  left: calc(-1 * var(--sp-6));
  right: calc(-1 * var(--sp-6));
  height: 24px;
  background: linear-gradient(to top, var(--bg-base) 40%, transparent);
  pointer-events: none;
}

.input-wrapper {
  display: flex;
  align-items: flex-end;
  gap: var(--sp-2);
  background: var(--bg-input);
  border: 1px solid var(--border-base);
  border-radius: var(--radius-lg);
  padding: var(--sp-2) var(--sp-2) var(--sp-2) var(--sp-5);
  transition: border-color var(--duration-fast) var(--ease-out),
              box-shadow var(--duration-fast) var(--ease-out),
              background var(--duration-fast) var(--ease-out);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: var(--shadow-sm);
}

.input-wrapper:focus-within {
  border-color: var(--border-accent);

<script>
// ═══════════════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════════════
const state = {
  connected: false, streaming: false, thinking: false, agentActive: false,
  model: null, cwd: '', sessionId: null, reconnecting: false, eventSource: null,
  toolOutputs: new Map(),
  currentAssistantEl: null, currentThinkingEl: null,
  theme: 'system', _mdTimer: null,
};

// ═══════════════════════════════════════════════════════════════════
// DOM refs
// ═══════════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const D = {
  dot: $('connectionDot'),
  modelBadge: $('modelBadge'), modelProv: $('modelProvider'), modelName: $('modelName'),
  cwd: $('headerCwd'),
  thinkInd: $('thinkingIndicator'),
  themeBtn: $('themeToggle'), themeIcon: $('themeIcon'),
  msgCtr: $('messagesContainer'), msgList: $('messagesList'), empty: $('emptyState'),
  scrollBtn: $('scrollBottomBtn'),
  input: $('messageInput'), send: $('btnSend'),
};

// ═══════════════════════════════════════════════════════════════════
// Theme
// ═══════════════════════════════════════════════════════════════════
const THEME_CYCLE = ['system','dark','light'];
const THEME_ICONS = { system:'◐', dark:'☾', light:'☀' };

function getTheme() { try { return localStorage.getItem('pi-web-theme') || 'system'; } catch { return 'system'; } }
function setTheme(t) { try { localStorage.setItem('pi-web-theme', t); } catch {} }

function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  state.theme = t;
  D.themeIcon.textContent = THEME_ICONS[t] || '◐';
}

applyTheme(getTheme());
D.themeBtn.addEventListener('click', () => {
  const i = THEME_CYCLE.indexOf(state.theme);
  const n = THEME_CYCLE[(i + 1) % 3];
  applyTheme(n); setTheme(n);
});

// ═══════════════════════════════════════════════════════════════════
// Input
// ═══════════════════════════════════════════════════════════════════
D.input.addEventListener('input', () => {
  D.input.style.height = 'auto';
  D.input.style.height = Math.min(D.input.scrollHeight, 200) + 'px';
  if (!D.send.classList.contains('stop-mode')) {
    D.send.disabled = !D.input.value.trim();
  }
});

D.input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (D.send.classList.contains('stop-mode')) {
      interrupt();
    } else {
      sendMsg();
    }
  }
});

D.send.addEventListener('click', () => {
  if (D.send.classList.contains('stop-mode')) {
    interrupt();
  } else {
    sendMsg();
  }
});

document.addEventListener('keydown', e => {
  if (e.key === '/' && !e.ctrlKey && !e.metaKey && !e.altKey) {
    const t = document.activeElement?.tagName;
    if (t !== 'INPUT' && t !== 'TEXTAREA') { e.preventDefault(); D.input.focus(); }
  }
});

async function sendMsg() {
  const text = D.input.value.trim();
  if (!text || !state.connected) return;
  D.input.value = ''; D.input.style.height = 'auto'; D.send.disabled = true;
  try {
    const r = await fetch('/message', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text}) });
    if (!r.ok) throw Error('send failed');
  } catch (e) { console.error('send err:', e); setBanner('error','send failed'); }
}
